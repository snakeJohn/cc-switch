# Build downloadable app artifacts without release signing secrets.
# Fork CI packaging — default: Windows x64 (exe + installers).
name: Build Artifacts

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: Platforms to build
        required: true
        default: windows
        type: choice
        options:
          - windows
          - windows-linux
          - all

permissions:
  contents: read

concurrency:
  group: build-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Build matrix JSON
        id: set
        shell: bash
        run: |
          set -euo pipefail
          platforms="${{ github.event.inputs.platforms || 'windows' }}"
          case "$platforms" in
            windows)
              matrix='{"include":[{"name":"windows-x64","os":"windows-2022","platform":"windows"}]}'
              ;;
            windows-linux)
              matrix='{"include":[{"name":"windows-x64","os":"windows-2022","platform":"windows"},{"name":"linux-x64","os":"ubuntu-22.04","platform":"linux"}]}'
              ;;
            all)
              matrix='{"include":[{"name":"windows-x64","os":"windows-2022","platform":"windows"},{"name":"linux-x64","os":"ubuntu-22.04","platform":"linux"},{"name":"macos-universal","os":"macos-14","platform":"macos"}]}'
              ;;
            *)
              echo "Unknown platforms: $platforms" >&2
              exit 1
              ;;
          esac
          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Selected: $platforms"
          echo "$matrix"

  build:
    name: Build (${{ matrix.name }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: matrix.platform == 'macos'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Setup Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # Skip updater signing: fork CI has no TAURI_SIGNING_PRIVATE_KEY.
      - name: Disable updater artifacts (no signing key)
        shell: bash
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.bundle = c.bundle || {};
            c.bundle.createUpdaterArtifacts = false;
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
            console.log('createUpdaterArtifacts=false');
          "

      - name: Build Tauri App (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        timeout-minutes: 90
        run: pnpm tauri build

      - name: Build Tauri App (Linux)
        if: matrix.platform == 'linux'
        timeout-minutes: 90
        run: pnpm tauri build --bundles appimage,deb

      - name: Build Tauri App (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        timeout-minutes: 90
        # Unsigned app bundle only (no Apple certs on fork).
        run: pnpm tauri build --target universal-apple-darwin --bundles app

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          VERSION=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse --short HEAD)
          TAG="CC-Switch-${VERSION}-grok-${SHA}"

          case "${{ matrix.platform }}" in
            windows)
              if [ -f "src-tauri/target/release/cc-switch.exe" ]; then
                cp "src-tauri/target/release/cc-switch.exe" "artifacts/${TAG}-windows-x64.exe"
              fi
              find src-tauri/target/release/bundle -type f \( -name '*.msi' -o -name '*.exe' \) 2>/dev/null | while read -r f; do
                base=$(basename "$f")
                cp "$f" "artifacts/${TAG}-${base}"
              done
              ;;
            linux)
              find src-tauri/target/release/bundle -type f \( -name '*.AppImage' -o -name '*.deb' \) 2>/dev/null | while read -r f; do
                base=$(basename "$f")
                cp "$f" "artifacts/${TAG}-${base}"
              done
              ;;
            macos)
              for path in \
                src-tauri/target/universal-apple-darwin/release/bundle/macos \
                src-tauri/target/release/bundle/macos; do
                if [ -d "$path" ]; then
                  find "$path" -maxdepth 1 -name '*.app' -type d | while read -r app; do
                    zipname="${TAG}-macOS.zip"
                    (cd "$(dirname "$app")" && zip -r "$GITHUB_WORKSPACE/artifacts/$zipname" "$(basename "$app")")
                  done
                fi
              done
              ;;
          esac

          echo "=== artifacts ==="
          ls -la artifacts || true
          count=$(find artifacts -type f | wc -l | tr -d ' ')
          if [ "$count" = "0" ]; then
            echo "❌ No artifacts collected" >&2
            find src-tauri/target -maxdepth 6 -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.deb' -o -name '*.AppImage' \) 2>/dev/null || true
            find src-tauri/target -maxdepth 6 -type d -name '*.app' 2>/dev/null || true
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cc-switch-${{ matrix.name }}-${{ github.sha }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14
