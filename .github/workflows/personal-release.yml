# Personal / fork release: build unsigned installers and publish to GitHub Releases.
# Does NOT require TAURI_SIGNING_PRIVATE_KEY or Apple certs.
# Official `Release` workflow stays for upstream-style signed releases.
name: Personal Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v3.17.0-grok.1). Leave empty to auto: v{packageVersion}-grok.{run_number}"
        required: false
        type: string
        default: ""
      platforms:
        description: Platforms to build
        required: true
        default: windows
        type: choice
        options:
          - windows
          - windows-linux
          - all
      prerelease:
        description: Mark as pre-release on GitHub
        required: true
        default: true
        type: boolean
      draft:
        description: Create as draft (not publicly listed until published)
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: personal-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve tag and matrix
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="v${VERSION}-grok.${{ github.run_number }}"
          fi
          # Normalize: ensure starts with v
          case "$TAG" in
            v*) ;;
            *) TAG="v${TAG}" ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG (package $VERSION)"

      - name: Build matrix JSON
        id: set
        shell: bash
        run: |
          set -euo pipefail
          platforms="${{ github.event.inputs.platforms || 'windows' }}"
          case "$platforms" in
            windows)
              matrix='{"include":[{"name":"windows-x64","os":"windows-2022","platform":"windows"}]}'
              ;;
            windows-linux)
              matrix='{"include":[{"name":"windows-x64","os":"windows-2022","platform":"windows"},{"name":"linux-x64","os":"ubuntu-22.04","platform":"linux"}]}'
              ;;
            all)
              matrix='{"include":[{"name":"windows-x64","os":"windows-2022","platform":"windows"},{"name":"linux-x64","os":"ubuntu-22.04","platform":"linux"},{"name":"macos-universal","os":"macos-14","platform":"macos"}]}'
              ;;
            *)
              echo "Unknown platforms: $platforms" >&2
              exit 1
              ;;
          esac
          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Selected: $platforms"
          echo "$matrix"

  build:
    name: Build (${{ matrix.name }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: matrix.platform == 'macos'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Setup Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # Fork has no TAURI_SIGNING_PRIVATE_KEY — disable updater signatures.
      - name: Disable updater artifacts (no signing key)
        shell: bash
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.bundle = c.bundle || {};
            c.bundle.createUpdaterArtifacts = false;
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
            console.log('createUpdaterArtifacts=false');
          "

      - name: Build Tauri App (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        timeout-minutes: 90
        run: pnpm tauri build

      - name: Build Tauri App (Linux)
        if: matrix.platform == 'linux'
        timeout-minutes: 90
        run: pnpm tauri build --bundles appimage,deb

      - name: Build Tauri App (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        timeout-minutes: 90
        # Unsigned app bundle only (no Apple certs on fork).
        run: pnpm tauri build --target universal-apple-darwin --bundles app

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          TAG="${{ needs.prepare.outputs.tag }}"
          # GitHub release asset names cannot contain path separators
          SAFE_TAG=$(echo "$TAG" | tr '/' '-')

          case "${{ matrix.platform }}" in
            windows)
              if [ -f "src-tauri/target/release/cc-switch.exe" ]; then
                cp "src-tauri/target/release/cc-switch.exe" "artifacts/${SAFE_TAG}-windows-x64.exe"
              fi
              find src-tauri/target/release/bundle -type f \( -name '*.msi' -o -name '*.exe' \) 2>/dev/null | while read -r f; do
                base=$(basename "$f")
                cp "$f" "artifacts/${SAFE_TAG}-${base}"
              done
              ;;
            linux)
              find src-tauri/target/release/bundle -type f \( -name '*.AppImage' -o -name '*.deb' \) 2>/dev/null | while read -r f; do
                base=$(basename "$f")
                cp "$f" "artifacts/${SAFE_TAG}-${base}"
              done
              ;;
            macos)
              for path in \
                src-tauri/target/universal-apple-darwin/release/bundle/macos \
                src-tauri/target/release/bundle/macos; do
                if [ -d "$path" ]; then
                  find "$path" -maxdepth 1 -name '*.app' -type d | while read -r app; do
                    zipname="${SAFE_TAG}-macOS.zip"
                    (cd "$(dirname "$app")" && zip -r "$GITHUB_WORKSPACE/artifacts/$zipname" "$(basename "$app")")
                  done
                fi
              done
              ;;
          esac

          echo "=== artifacts ==="
          ls -la artifacts || true
          count=$(find artifacts -type f | wc -l | tr -d ' ')
          if [ "$count" = "0" ]; then
            echo "❌ No artifacts collected" >&2
            find src-tauri/target -maxdepth 6 -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.deb' -o -name '*.AppImage' \) 2>/dev/null || true
            find src-tauri/target -maxdepth 6 -type d -name '*.app' 2>/dev/null || true
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: List release assets
        shell: bash
        run: |
          set -euo pipefail
          echo "=== release-assets ==="
          find release-assets -type f -print | sort
          count=$(find release-assets -type f | wc -l | tr -d ' ')
          if [ "$count" = "0" ]; then
            echo "❌ No release assets downloaded" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: CC Switch ${{ needs.prepare.outputs.tag }} (Grok Build fork)
          target_commitish: ${{ github.sha }}
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ github.event.inputs.prerelease != 'false' }}
          generate_release_notes: true
          body: |
            ## Personal fork build (Grok Build)

            - **Package version:** `${{ needs.prepare.outputs.version }}`
            - **Tag:** `${{ needs.prepare.outputs.tag }}`
            - **Commit:** `${{ github.sha }}`
            - **Branch:** `${{ github.ref_name }}`

            ### Notes
            - **Unsigned** installers (no Tauri updater signing key / Apple certs on this fork).
            - Windows SmartScreen may warn; choose “More info” → “Run anyway” if needed.
            - Built for personal use of [snakeJohn/cc-switch](https://github.com/snakeJohn/cc-switch) with first-class **Grok Build** support.

            ### Install (Windows)
            Prefer the setup `.exe` / `.msi` from Assets below, or run the portable `*-windows-x64.exe`.
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
